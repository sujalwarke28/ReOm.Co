worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    keepalive_timeout  65;

    # Security Headers
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-XSS-Protection "1; mode=block";
    add_header X-Content-Type-Options "nosniff";

    # Main Server Block
    server {
        listen       80;
        server_name  localhost;

        # NOTE: For production, uncomment and configure SSL
        # listen 443 ssl;
        # ssl_certificate /etc/nginx/ssl/reomco.crt;
        # ssl_certificate_key /etc/nginx/ssl/reomco.key;

        # Proxy API Requests to Backend Docker Container
        location /api/ {
            proxy_pass http://localhost:3000/api/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Proxy All Other Requests to Frontend Docker Container
        location / {
            # Assuming frontend container exposes port 80 and is mapped locally (e.g. to 8080 if Nginx is on 80)
            # For this setup, we proxy to the local docker port mapping
            proxy_pass http://localhost:8080/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }
    }
}
